<!doctype html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Fotogram</title>
        <link rel="stylesheet" href="./style/style.css" />
        <link rel="stylesheet" href="./style/dialogstyle.css">
        <link rel="stylesheet" href="./style/breakmax.css">
        <link rel="stylesheet" href="./style/breakmax480.css">
        <link rel="shortcut icon" href="./assets/icons/Group.svg" type="image/x-icon">
    </head>
    <body onload="renderDogGallery()">
        <header class="gl-header">
            <hgroup class="head-icon">
                <img id="headFlowerIcon" src="./assets/icons/Group.svg" alt="Buntes Fotogram icon als Blume"/>
                <img id="headText" src="./assets/img/Fotogram.svg" alt="">
            </hgroup>
        </header>
        <main class="gl-main">
            <section class="main-content">
                <h1 class="content-headlineOne">My Dog photo album </h1>
                <section id="content-dogGallery" class="content-gallery" >
                </section>
                <dialog id="dialogGallery" class="content-dialog">
                    <header>
                        <h2 id="pictureTitle">Titel</h2>
                        <img id="switchleft" class="switch" onclick="closeDialog()" src="./assets/icons/file.svg" alt="">
                    </header>
                    <main id="dialogPicture" class="dialogMainContent">
                    </main>
                    <footer>
                        <div class="switch-bg">
                            <img id="switchleft" class="switch" onclick="" src="./assets/icons/pfote.png" alt="">
                        </div>
                        <p>1-12</p>
                        <div class="switch-bg">
                            <img id="switchRight" class="switch" onclick="" src="./assets/icons/pfote.png" alt="">
                        </div>
                    </footer>
                </dialog>
            </section>

        </main>
        <footer class="gl-footer">
            <section class="footer-section">
                <picture class="footer-images">
                    <img id="logoDA" src="./assets/icons/Icon.svg" alt="Logo der Developer Akademie">
                    <img id="textDA" src="./assets/img/Text.svg" alt="Schriftzug der Developer Akademie">
                </picture>
                <p>&copy; 2026 Developer Akademie GmbH</p>
            </section>
        </footer>
    </body>
    <script src="./script/script.js"></script>
</html>
